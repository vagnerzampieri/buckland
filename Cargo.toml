[package]
name = "buckland"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
license = "GPL-3.0-or-later"
description = "TUI-first time tracker for developers who use Shortcut."
repository = "https://github.com/vagnerzampieri/buckland"
categories = ["command-line-utilities"]
keywords = ["tui", "time-tracking", "shortcut", "productivity"]
default-run = "bl"

[lib]
name = "buckland"
path = "src/lib.rs"

[[bin]]
name = "bl"
path = "src/main.rs"

[[bin]]
name = "bl-tray"
path = "src/bin/bl-tray.rs"
required-features = ["tray"]

[features]
default = ["tray"]
tray = []

[dependencies]
anyhow = "1"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
